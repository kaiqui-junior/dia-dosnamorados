<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💖 pergunta</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:black;
    font-family:Arial,sans-serif;

    background-image:url("foto7.png");
    background-size:50%;
    background-position:center top;
    background-repeat:no-repeat;
}

h1{
    position:absolute;
    top:72%;
    left:50%;
    transform:translate(-50%,-50%);
    width:90%;
    color:#ff9ac8;
    font-size:clamp(26px,6vw,38px);
    text-align:center;
    text-shadow:0 0 15px #ff9ac8;
    z-index:10;
}

#buttons{
    position:absolute;
    top:78%;
    left:50%;
    transform:translateX(-50%);

    display:flex;
    gap:20px;

    z-index:10;
}

button{
    padding:12px 24px;
    font-size:16px;

    border:none;
    border-radius:12px;

    cursor:pointer;
    font-weight:bold;

    transition:0.2s;
}

#sim{
    background:#ff9ac8;
    box-shadow:0 0 15px #ff9ac8;
}

#nao{
    background:#444;
    color:white;
}

button:hover{
    transform:scale(1.05);
}

.heart{
    position:absolute;
    top:-50px;
    color:#ff9ac8;
    font-size:20px;
    animation:fall linear forwards;
    pointer-events:none;
    text-shadow:0 0 10px #ff9ac8;
}

@keyframes fall{
    to{
        transform:translateY(110vh);
        opacity:0;
    }
}

@media (max-width:768px){

    body{
        background-size:90%;
        background-position:center top;
        background-repeat:no-repeat;
    }

    h1{
        top:58%;
        font-size:28px;
    }

    #buttons{
        top:72%;
        gap:12px;
    }

    button{
        padding:10px 18px;
        font-size:14px;
    }
}
</style>

</head>

<body>

<h1>eu te faço feliz? 💖</h1>

<div id="buttons">
    <button id="sim">SIM 💖</button>
    <button id="nao">NÃO 💔</button>
</div>

<script>

document.getElementById("sim").onclick = () => {
    window.location.href = "suficiente.html";
};

document.getElementById("nao").onclick = () => {
    window.location.href = "serio.html";
};

function criarCoracao(){
    const c = document.createElement("div");
    c.className = "heart";
    c.innerText = "💖";

    c.style.left = Math.random() * window.innerWidth + "px";

    const size = Math.random() * 20 + 10;
    c.style.fontSize = size + "px";

    const duration = Math.random() * 3 + 3;
    c.style.animationDuration = duration + "s";

    document.body.appendChild(c);

    setTimeout(() => c.remove(), duration * 1000);
}

setInterval(criarCoracao, 120);

</script>

</body>
</html>

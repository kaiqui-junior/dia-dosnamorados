<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>sério?</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:black;
    font-family:Arial, sans-serif;
    overflow-x:hidden;
    min-height:100vh;
}

#fotos{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:30px;
    min-height:100vh;
    padding:100px 20px 120px;
}

#fotos img{
    max-width:40%;
    max-height:65vh;
    object-fit:contain;
    border-radius:10px;
}

h1{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    color:#ff4d4d;
    font-size:42px;
    text-align:center;
    text-shadow:0 0 15px red;
    z-index:1000;
    pointer-events:none;
}
h1{
    background:rgba(0,0,0,0.5);
    padding:10px 20px;
    border-radius:15px;
}

#btn{
    position:fixed;
    bottom:30px;
    left:50%;
    transform:translateX(-50%);

    padding:12px 24px;
    font-size:16px;
    border:none;
    border-radius:12px;
    cursor:pointer;

    background:#444;
    color:white;
    font-weight:bold;

    box-shadow:0 0 15px red;
    transition:0.2s;
    z-index:1000;
}

#btn:hover{
    transform:translateX(-50%) scale(1.05);
}

.heart{
    position:fixed;
    top:-50px;
    font-size:22px;
    color:#ff4d4d;
    animation:fall linear forwards;
    text-shadow:0 0 10px red;
    pointer-events:none;
    z-index:999;
}

@keyframes fall{
    to{
        transform:translateY(110vh);
        opacity:0;
    }
}

@media (max-width:768px){

    #fotos{
        flex-direction:column;
        padding-top:100px;
        padding-bottom:120px;
        gap:20px;
    }

    #fotos img{
        width:80%;
        max-width:300px;
        max-height:35vh;
    }

    h1{
        font-size:30px;
        width:90%;
    }
}
</style>

</head>
<body>

<h1>sério? 😔</h1>

<div id="fotos">
    <img src="foto4.png" alt="">
    <img src="foto6.png" alt="">
</div>

<a href="index.html">
    <button id="btn">voltar 💔</button>
</a>

<script>
function criarCoracaoPartido(){
    const c = document.createElement("div");
    c.className = "heart";
    c.innerText = "💔";

    c.style.left = Math.random() * window.innerWidth + "px";

    const size = Math.random() * 20 + 10;
    c.style.fontSize = size + "px";

    const duration = Math.random() * 3 + 3;
    c.style.animationDuration = duration + "s";

    document.body.appendChild(c);

    setTimeout(() => c.remove(), duration * 1000);
}

setInterval(criarCoracaoPartido, 120);
</script>

</body>
</html>

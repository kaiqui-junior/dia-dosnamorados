<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>sério?</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:black;
    font-family:Arial, sans-serif;
    
    background-image:url("foto4.png");
    background-size:100%;
    background-position:show center;
    background-repeat:no-repeat;
}

/* texto central */
h1{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    color:#ff4d4d;
    font-size:42px;
    text-align:center;
    text-shadow:0 0 15px red;
    z-index:10;
}

/* botão voltar */
#btn{
    position:absolute;
    bottom:30px;
    left:50%;
    transform:translateX(-50%);

    padding:12px 24px;
    font-size:16px;
    border:none;
    border-radius:12px;
    cursor:pointer;

    background:#444;
    color:white;
    font-weight:bold;

    box-shadow:0 0 15px red;
    transition:0.2s;
    z-index:10;
}

#btn:hover{
    transform:translateX(-50%) scale(1.05);
}

/* coração partido */
.heart{
    position:absolute;
    top:-50px;
    font-size:22px;
    color:#ff4d4d;
    animation:fall linear forwards;
    text-shadow:0 0 10px red;
    pointer-events:none;
}

/* queda */
@keyframes fall{
    to{
        transform:translateY(110vh);
        opacity:0;
    }
}
</style>

</head>

<body>

<h1>sério? 😔</h1>

<!-- botão voltar -->
<a href="index.html">
    <button id="btn">voltar 💔</button>
</a>

<script>

function criarCoracaoPartido(){
    const c = document.createElement("div");
    c.className = "heart";
    c.innerText = "💔";

    c.style.left = Math.random() * window.innerWidth + "px";

    const size = Math.random() * 20 + 10;
    c.style.fontSize = size + "px";

    const duration = Math.random() * 3 + 3;
    c.style.animationDuration = duration + "s";

    document.body.appendChild(c);

    setTimeout(() => c.remove(), duration * 1000);
}

setInterval(criarCoracaoPartido, 120);

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>❤️ Eu te amo ❤️</title>

<style>
body{
    margin:0;
    background:black;
    overflow:hidden;

    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;

    height:100vh;

    background-image:url("foto2.png");
    background-size:55%;
    background-position:top center;
    background-repeat:no-repeat;
}

#heart{
    position:relative;
    width:700px;
    height:700px;
}

.love{
    position:absolute;
    color:#ff9ac8;
    font-family:Arial,sans-serif;
    font-size:12px;
    white-space:nowrap;
    text-shadow:0 0 6px #ff9ac8;
    transform:translate(-50%, -50%);
}

#nome{
    position:absolute;

    color:white;
    font-size:50px;
    font-weight:bold;

    font-family:Arial,sans-serif;

    text-shadow:
        0 0 10px #ff9ac8,
        0 0 20px #ff9ac8;

    z-index:999;
}

#center-text{
    position:absolute;
    left:50%;
    top:57%;
    transform:translate(-50%, -50%);

    color:white;
    font-size:22px;
    text-align:center;

    text-shadow:0 0 10px #ff9ac8;

    z-index:999;
}

#btn{
    margin-top:-80px;

    padding:12px 24px;

    font-size:16px;
    font-weight:bold;

    border:none;
    border-radius:12px;

    cursor:pointer;

    background:#ff9ac8;

    box-shadow:0 0 15px #ff9ac8;

    transition:0.2s;
    z-index:999;
}

#btn:hover{
    transform:scale(1.05);
    box-shadow:0 0 25px #ff9ac8;
}

.fall{
    position:absolute;
    top:-50px;

    color:#ff9ac8;

    font-size:20px;

    animation:fall linear forwards;

    text-shadow:0 0 10px #ff9ac8;

    pointer-events:none;
}

@keyframes fall{
    to{
        transform:translateY(110vh);
        opacity:0;
    }
}
@media (max-width:768px){

    body{
        background-size:100%;
    }

    #heart{
        transform:scale(0.55);
    }

    #nome{
        font-size:28px;
    }

    #center-text{
        top:58%;
        width:85%;
        font-size:16px;
    }

    #btn{
        margin-top:-120px;
        font-size:14px;
        padding:10px 20px;
    }

    .love{
        font-size:10px;
    }
}
</style>
</head>

<body>

<div id="heart"></div>

<div id="nome">K❤️K</div>

<div id="center-text">
    vamos fazer dar certo para sempre?
</div>

<a href="aceito.html">
    <button id="btn">aceito 💖</button>
</a>

<script>

const heart = document.getElementById("heart");

const CENTER = 350;
const SCALE = 18;

const palavras = [];

for(let camada = 0; camada < 4; camada++){

    const escalaCamada = SCALE - camada * 1.5;

    for(let t = 0; t < Math.PI * 2; t += 0.07){

        const span = document.createElement("span");

        span.className = "love";
        span.textContent = "Eu te amo";

        heart.appendChild(span);

        palavras.push({
            el: span,
            offset: t,
            escala: escalaCamada
        });
    }
}

function animar(){

    const tempo = performance.now() * 0.001;

    for(const p of palavras){

        const t = p.offset + tempo;

        const x = 16 * Math.pow(Math.sin(t),3);

        const y =
            13 * Math.cos(t)
            - 5 * Math.cos(2*t)
            - 2 * Math.cos(3*t)
            - Math.cos(4*t);

        p.el.style.left =
            (CENTER + x * p.escala) + "px";

        p.el.style.top =
            (CENTER - y * p.escala) + "px";
    }

    requestAnimationFrame(animar);
}

animar();

/* chuva de corações */
function criarCoracao(){

    const c = document.createElement("div");

    c.className = "fall";
    c.innerText = "💖";

    c.style.left =
        Math.random() * window.innerWidth + "px";

    const size =
        Math.random() * 20 + 10;

    c.style.fontSize =
        size + "px";

    const duration =
        Math.random() * 3 + 3;

    c.style.animationDuration =
        duration + "s";

    document.body.appendChild(c);

    setTimeout(() => {
        c.remove();
    }, duration * 1000);
}

setInterval(criarCoracao, 120);

</script>

</body>
</html>
